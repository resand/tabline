<svg xmlns="http://www.w3.org/2000/svg" width="920" height="680" viewBox="0 0 920 680">
  <!-- Same brand language as the small promo tile, scaled with more breathing room. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#16121d"/>
      <stop offset="100%" stop-color="#231a2f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.5" r="0.7">
      <stop offset="0%"   stop-color="rgba(196,181,253,0.08)"/>
      <stop offset="100%" stop-color="rgba(196,181,253,0)"/>
    </radialGradient>
  </defs>
  <rect width="920" height="680" fill="url(#bg)"/>
  <rect width="920" height="680" fill="url(#glow)"/>

  <!-- Squircle icon, larger (260px), positioned slightly above center -->
  <g transform="translate(120, 210)">
    <rect width="260" height="260" rx="58" fill="#1a1620" stroke="rgba(196,181,253,0.08)" stroke-width="1.5"/>
    <g fill="#c4b5fd" transform="translate(50, 50)">
      <rect x="0"    y="0"    width="40" height="40" rx="10"/>
      <rect x="60"   y="0"    width="40" height="40" rx="10"/>
      <rect x="120"  y="0"    width="40" height="40" rx="10"/>
      <rect x="0"    y="60"   width="40" height="40" rx="10"/>
      <rect x="60"   y="60"   width="40" height="40" rx="10"/>
      <rect x="120"  y="60"   width="40" height="40" rx="10"/>
      <rect x="0"    y="120"  width="40" height="40" rx="10"/>
      <rect x="60"   y="120"  width="40" height="40" rx="10"/>
      <rect x="120"  y="120"  width="40" height="40" rx="10"/>
    </g>
  </g>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, system-ui, sans-serif">
    <!-- Main title -->
    <text x="440" y="330" font-size="92" font-weight="700" fill="#ffffff" letter-spacing="-1.8">TabLine</text>
    <!-- Tagline -->
    <text x="440" y="380" font-size="26" font-weight="400" fill="#c4b5fd" letter-spacing="0.2">A quiet new tab.</text>
    <!-- Feature list -->
    <text x="440" y="438" font-size="20" font-weight="400" fill="#a89bb5" letter-spacing="0.3">Clock · Search · Shortcuts · Wallpapers</text>

    <!-- Bottom credit -->
    <text x="120" y="620" font-size="14" font-weight="500" fill="#5a4d6a" letter-spacing="1.5">BUILT WITH ANTIGRAVITY 2.0.0 · GEMINI 3.5 FLASH</text>
  </g>
</svg>
